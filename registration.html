<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Реєстрація</title>
  <link rel="stylesheet" href="cssstyle.css">
</head>
<body>
  <div class="form-container">
    <h2>Реєстрація</h2>
    <form>
      <input type="text" placeholder="Ім’я" required><br>
      <input type="email" placeholder="Електронна пошта" required><br>
      <input type="password" placeholder="Пароль" required><br>
      <input type="password" placeholder="Підтвердіть пароль" required><br>
      <div class="gender">
        <span>Стать:</span><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Чоловіча</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Жіноча</label>
      </div>
      <select required>
        <option value="">Оберіть країну</option>
        <option value="ua">Україна</option>
        <option value="pl">Австрія</option>
        <option value="de">Німеччина</option>
        <option value="us">США</option>
      </select><br>
      <div class="terms">
        <input type="checkbox" id="agree" required>
        <label for="agree">Погоджуюсь з умовами</label>
      </div>
      <button type="submit">Зареєструватися</button>
    </form>
  </div>
</body>
</html>
